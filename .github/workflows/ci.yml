name: Matcha backend CI

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"
      - "!backend/**/*.md"
      - "!backend/docs/**"
      - "!backend/**/*.png"
      - "!backend/**/*.jpg"
      - "!backend/**/*.jpeg"
      - "!backend/**/*.gif"
      - "!backend/**/*.svg"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend test image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          target: dev
          load: true
          tags: img_backend_dev
          cache-from: type=gha,scope=matcha-backend-dev
          cache-to: type=gha,mode=max,scope=matcha-backend-dev

      - name: Run backend tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/backend:/app" \
            -w /app \
            -e PYTHONPATH=/app \
            img_backend_dev \
            pytest tests/ \
              --import-mode=importlib \
              --cov=app \
              --cov-report=term-missing
