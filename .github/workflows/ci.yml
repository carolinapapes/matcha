name: Matcha CI/CD Pipeline

on:
	push:
		branches: [ main, develop, "feature/*", "fix/*" ]
	pull_request:
		branches: [ main, develop ]

	permissions:
	contents: read
	pull-requests: write
	issues: write

	jobs:
	build-and-test:
		runs-on: ubuntu-latest
		name: Build and Test

		steps:
		- name: Checkout code
			uses: actions/checkout@v4

		- name: Set up Python
			uses: actions/setup-python@v5
			with:
			python-version: '3.12'

		- name: Install dependencies
			run: |
				python -m pip install --upgrade pip
				pip install pytest pytest-cov pytest-mock factory-boy Faker

		- name: Code Style Check (Backend)
			run: echo "Code Style Check"