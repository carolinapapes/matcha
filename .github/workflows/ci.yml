name: Matcha backend CI

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for relevant backend changes
        id: changes
        shell: bash
        run: |
          changed_files="$(
            git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}"
          )"

          echo "Changed files:"
          echo "$changed_files"

          relevant_files="$(
            echo "$changed_files" |
              grep -E '^(backend/|\.github/workflows/ci\.yml$)' |
              grep -Ev '^backend/docs/' |
              grep -Ev '^backend/.*\.(md|png|jpg|jpeg|gif|svg)$' ||
              true
          )"

          if [ -n "$relevant_files" ]; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
            echo "Relevant backend changes:"
            echo "$relevant_files"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
            echo "No relevant backend changes."
          fi

      - name: Skip backend tests
        if: steps.changes.outputs.backend_changed != 'true'
        run: echo "Backend tests are not required. Check passes."

      - name: Set up Docker Buildx
        if: steps.changes.outputs.backend_changed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build backend test image
        if: steps.changes.outputs.backend_changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          target: dev
          load: true
          tags: img_backend_dev
          cache-from: type=gha,scope=matcha-backend-dev
          cache-to: type=gha,mode=max,scope=matcha-backend-dev

      - name: Run backend tests
        if: steps.changes.outputs.backend_changed == 'true'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/backend:/app" \
            -w /app \
            -e PYTHONPATH=/app \
            img_backend_dev \
            pytest tests/ \
              --import-mode=importlib \
              --cov=app \
              --cov-report=term-missing
